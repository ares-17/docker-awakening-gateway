<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Docker Awakening Gateway — SVG Topology</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b75ee",
                        "bg-dark": "#0d1117",
                        "bg-light": "#f8fafc",
                        "card-dark": "#161b22",
                        "card-light": "#ffffff",
                        "border-dark": "#30363d",
                        "border-light": "#e2e8f0",
                        "status-running": "#238636",
                        "status-error": "#da3633",
                        "status-stopped": "#8b949e",
                        "status-starting": "#d29922",
                        "status-awakening": "#2b75ee",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

        /* Dark mode scrollbar */
        .dark ::-webkit-scrollbar { width: 4px; }
        .dark ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

        /* Simple Icons: dark on light, white on dark */
        .dark .si-icon { filter: brightness(0) invert(1); }
        .si-icon { filter: brightness(0); }

        /* SVG graph nodes */
        .sv-node { cursor: pointer; }
        .sv-node .node-bg { transition: filter 0.15s ease; }
        .sv-node:hover .node-bg { filter: brightness(1.25); }
    </style>
</head>

<body
    class="dark:bg-bg-dark bg-bg-light dark:text-slate-300 text-slate-700 font-display min-h-screen flex flex-col transition-colors duration-200">

    <!-- ─── Inline SVG symbol definitions ───────────────────────────────── -->
    <svg xmlns="http://www.w3.org/2000/svg" class="hidden">
        <symbol id="icon-container" viewBox="0 -960 960 960">
            <path d="M440-183v-274L200-596v274l240 139Zm80 0 240-139v-274L520-457v274Zm-40-343 237-137-237-137-237 137 237 137ZM160-252q-19-11-29.5-29T120-321v-318q0-22 10.5-40t29.5-29l280-161q19-11 40-11t40 11l280 161q19 11 29.5 29t10.5 40v318q0 22-10.5 40T800-252L520-91q-19 11-40 11t-40-11L160-252Z" />
        </symbol>
        <symbol id="icon-dark-mode" viewBox="0 -960 960 960">
            <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z" />
        </symbol>
        <symbol id="icon-light-mode" viewBox="0 -960 960 960">
            <path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z" />
        </symbol>
        <symbol id="icon-reload" viewBox="0 -960 960 960">
            <path d="M160-160v-80h110l-16-14q-52-46-73-105t-21-119q0-111 66.5-197.5T400-790v84q-72 26-116 88.5T240-478q0 45 17 87.5t53 78.5l10 10v-98h80v240H160Zm400-10v-84q72-26 116-88.5T720-482q0-45-17-87.5T650-648l-10-10v98h-80v-240h240v80H690l16 14q49 49 71.5 106.5T800-482q0 111-66.5 197.5T560-170Z" />
        </symbol>
    </svg>

    <!-- ─── Header ───────────────────────────────────────────────────────── -->
    <header
        class="border-b dark:border-border-dark border-slate-200 dark:bg-card-dark bg-white px-4 sm:px-6 py-4 sticky top-0 z-50 transition-colors duration-200 shadow-[0_1px_3px_rgba(0,0,0,0.05)] dark:shadow-none">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">

            <!-- Logo + title -->
            <div class="flex items-center gap-3">
                <div class="bg-primary/20 p-2 rounded-lg text-primary">
                    <svg class="w-6 h-6" fill="currentColor">
                        <use href="#icon-container" />
                    </svg>
                </div>
                <div>
                    <h1 class="dark:text-white text-slate-900 text-xl font-bold tracking-tight">Docker Awakening
                        Gateway</h1>
                    <p class="text-xs dark:text-slate-500 text-slate-400 font-mono">/_topology/svg</p>
                </div>
            </div>

            <!-- View switcher -->
            <div
                class="flex items-center gap-2 dark:bg-bg-dark/50 bg-slate-100 p-1.5 rounded-lg dark:border-border-dark border-border-light border overflow-x-auto max-w-full">
                <a href="/_status"
                    class="flex items-center gap-2 px-3 py-1 rounded dark:bg-card-dark bg-white dark:border-border-dark border-border-light border min-w-fit dark:text-slate-400 text-slate-600 dark:hover:text-white hover:text-slate-900 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-slate-400 flex-shrink-0"></span>
                    <span class="text-xs font-bold font-mono">Status Dashboard</span>
                </a>
                <a href="/_topology"
                    class="flex items-center gap-2 px-3 py-1 rounded dark:bg-card-dark bg-white dark:border-border-dark border-border-light border min-w-fit dark:text-slate-400 text-slate-600 dark:hover:text-white hover:text-slate-900 transition-colors">
                    <span class="w-2 h-2 rounded-full bg-slate-400 flex-shrink-0"></span>
                    <span class="text-xs font-bold font-mono">Topology — Mermaid</span>
                </a>
                <div
                    class="flex items-center gap-2 px-3 py-1 rounded bg-primary/10 dark:border-primary/30 border-primary/40 border min-w-fit">
                    <span class="w-2 h-2 rounded-full bg-primary flex-shrink-0 animate-pulse-dot"></span>
                    <span class="text-xs font-bold text-primary font-mono">Topology — SVG</span>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3">
                <button onclick="window.location.reload()"
                    class="p-2 rounded-lg dark:hover:bg-border-dark hover:bg-slate-200 dark:text-slate-400 text-slate-500 hover:text-primary transition-colors"
                    title="Reload">
                    <svg class="w-5 h-5" fill="currentColor">
                        <use href="#icon-reload" />
                    </svg>
                </button>
                <div class="h-6 w-px dark:bg-border-dark bg-border-light"></div>
                <button id="btn-theme" onclick="toggleTheme()"
                    class="p-2 rounded-lg dark:bg-border-dark bg-slate-200 dark:text-white text-slate-700 transition-colors"
                    title="Toggle dark/light mode">
                    <svg id="theme-icon-dark" class="w-5 h-5" fill="currentColor">
                        <use href="#icon-dark-mode" />
                    </svg>
                    <svg id="theme-icon-light" class="w-5 h-5 hidden" fill="currentColor">
                        <use href="#icon-light-mode" />
                    </svg>
                </button>
            </div>

        </div>
    </header>

    <!-- ─── Main ─────────────────────────────────────────────────────────── -->
    <main class="flex-grow flex flex-col p-4 sm:p-6 min-h-0">
        <div id="graph-wrap"
            class="flex-grow dark:bg-card-dark bg-white rounded-xl border dark:border-border-dark border-slate-200 overflow-auto p-6">
            <svg id="graph-svg" width="100%" style="min-height:300px;display:block;"></svg>
        </div>

        <!-- Legend -->
        <div class="mt-3 flex flex-wrap items-center gap-4 text-xs font-mono dark:text-slate-400 text-slate-500">
            <span class="flex items-center gap-1.5">
                <span class="w-3 h-3 rounded-full" style="background:#238636"></span>Running
            </span>
            <span class="flex items-center gap-1.5">
                <span class="w-3 h-3 rounded-full" style="background:#8b949e"></span>Stopped
            </span>
            <span class="flex items-center gap-1.5">
                <span class="w-3 h-3 rounded-full" style="background:#d29922"></span>Starting
            </span>
            <span class="flex items-center gap-1.5">
                <span class="w-3 h-3 rounded-full" style="background:#da3633"></span>Failed
            </span>
            <span class="flex items-center gap-1.5">
                <span class="inline-block w-8 border-t-2 border-dashed dark:border-slate-500 border-slate-400"></span>
                Depends on
            </span>
        </div>
    </main>

    <!-- ─── Detail panel ─────────────────────────────────────────────────── -->
    <div id="panel"
        class="hidden fixed right-0 top-0 h-full w-80 dark:bg-card-dark bg-white border-l dark:border-border-dark border-slate-200 shadow-2xl z-50 flex flex-col overflow-y-auto">
        <div
            class="flex items-center justify-between px-4 py-3 border-b dark:border-border-dark border-slate-200 sticky top-0 dark:bg-card-dark bg-white">
            <div class="flex items-center gap-3 min-w-0">
                <div id="panel-icon-wrap"
                    class="w-8 h-8 rounded-lg dark:bg-primary/10 bg-blue-50 flex items-center justify-center dark:border-primary/20 border-blue-200 border flex-shrink-0">
                    <img id="panel-icon" src="" alt="" class="w-4 h-4 si-icon" style="display:none" />
                    <svg id="panel-icon-fallback" class="w-4 h-4 si-icon" fill="currentColor" viewBox="0 -960 960 960">
                        <use href="#icon-container" />
                    </svg>
                </div>
                <h2 id="panel-name"
                    class="text-sm font-bold dark:text-white text-slate-900 font-mono truncate"></h2>
            </div>
            <button onclick="closePanel()"
                class="p-1.5 rounded-md dark:hover:bg-border-dark hover:bg-slate-100 dark:text-slate-400 text-slate-500 flex-shrink-0 ml-2"
                title="Close">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="px-4 py-4 space-y-4 text-sm">
            <div class="flex items-center gap-2">
                <span id="panel-status-dot" class="w-2.5 h-2.5 rounded-full flex-shrink-0"></span>
                <span id="panel-status" class="font-semibold dark:text-white text-slate-800 capitalize"></span>
            </div>
            <dl class="space-y-3">
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Image</dt>
                    <dd id="panel-image" class="dark:text-slate-200 text-slate-700 font-mono text-xs break-all"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Host</dt>
                    <dd id="panel-host" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Port</dt>
                    <dd id="panel-port" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Health Path</dt>
                    <dd id="panel-health" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div id="panel-deps-row" class="hidden">
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Depends On</dt>
                    <dd id="panel-deps" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Uptime</dt>
                    <dd id="panel-uptime" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Last Request</dt>
                    <dd id="panel-last-req" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div id="panel-schedule-row" class="hidden">
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Schedule</dt>
                    <dd id="panel-schedule" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
                <div>
                    <dt class="text-xs uppercase tracking-wider dark:text-slate-500 text-slate-400 font-mono mb-0.5">Idle Timeout</dt>
                    <dd id="panel-idle" class="dark:text-slate-200 text-slate-700 font-mono text-xs"></dd>
                </div>
            </dl>
        </div>
    </div>

    <!-- ─── Scripts ──────────────────────────────────────────────────────── -->
    <script>
        var DATA    = {{.DataJSON}};
        var SI_CDN  = 'https://cdn.jsdelivr.net/npm/simple-icons@14/icons/';

        // ─── Layout constants ────────────────────────────────────────────
        var NODE_W = 164, NODE_H = 52, H_GAP = 100, V_GAP = 20, PAD = 40;

        // Status styles (dark-theme colours, consistent with status.html and topology.html)
        var STATUS_STYLE = {
            running:  { fill: '#1a4731', stroke: '#238636', bar: '#238636', dot: '#238636' },
            stopped:  { fill: '#21262d', stroke: '#30363d', bar: '#8b949e', dot: '#8b949e' },
            starting: { fill: '#3d2e0a', stroke: '#d29922', bar: '#e3b341', dot: '#d29922' },
            failed:   { fill: '#3b1219', stroke: '#da3633', bar: '#f85149', dot: '#da3633' },
        };
        var DEFAULT_STYLE = STATUS_STYLE.stopped;

        function toDisplayClass(s) {
            if (s === 'running')                      return 'running';
            if (s === 'restarting')                   return 'starting';
            if (s === 'dead' || s === 'removing')     return 'failed';
            return 'stopped';
        }

        function getStyle(status) {
            return STATUS_STYLE[toDisplayClass(status)] || DEFAULT_STYLE;
        }

        // SVG element factory
        function svgEl(tag, attrs) {
            var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            if (attrs) {
                Object.keys(attrs).forEach(function (k) {
                    el.setAttribute(k, attrs[k]);
                });
            }
            return el;
        }

        // ─── Layer assignment (longest-path from sources) ─────────────────
        // Edge direction: a.depends_on contains b → a is "upstream" (left), b is "downstream" (right).
        // layer[b] = max(layer[b], layer[a] + 1)
        function assignLayers(containers) {
            var layer = {};
            containers.forEach(function (c) { layer[c.name] = 0; });

            var changed = true;
            var maxIter = containers.length + 2;
            while (changed && maxIter-- > 0) {
                changed = false;
                containers.forEach(function (c) {
                    (c.depends_on || []).forEach(function (dep) {
                        if (layer[dep] !== undefined && layer[dep] < layer[c.name] + 1) {
                            layer[dep] = layer[c.name] + 1;
                            changed = true;
                        }
                    });
                });
            }
            return layer;
        }

        // ─── Compute node positions ───────────────────────────────────────
        function computeLayout(containers) {
            var layer = assignLayers(containers);

            // Group names by layer
            var byLayer = {};
            containers.forEach(function (c) {
                var l = layer[c.name];
                if (!byLayer[l]) byLayer[l] = [];
                byLayer[l].push(c.name);
            });

            var layerNums = Object.keys(byLayer).map(Number);
            var numLayers = Math.max.apply(null, layerNums) + 1;
            var maxNodes  = Math.max.apply(null, Object.values(byLayer).map(function (a) { return a.length; }));

            var totalW = numLayers * (NODE_W + H_GAP) - H_GAP + PAD * 2;
            var totalH = maxNodes  * (NODE_H + V_GAP) - V_GAP + PAD * 2;

            var pos = {};
            Object.keys(byLayer).forEach(function (l) {
                var names   = byLayer[l];
                var groupH  = names.length * (NODE_H + V_GAP) - V_GAP;
                var startY  = (totalH - groupH) / 2;
                names.forEach(function (name, i) {
                    pos[name] = {
                        x: PAD + parseInt(l, 10) * (NODE_W + H_GAP),
                        y: startY + i * (NODE_H + V_GAP),
                    };
                });
            });

            return { pos: pos, totalW: totalW, totalH: totalH };
        }

        // ─── Main render function ─────────────────────────────────────────
        function renderGraph() {
            var svg        = document.getElementById('graph-svg');
            var containers = DATA.containers || [];
            var groups     = DATA.groups     || [];

            if (!containers.length) {
                svg.setAttribute('viewBox', '0 0 400 120');
                svg.setAttribute('width', '400');
                svg.setAttribute('height', '120');
                var txt = svgEl('text', {
                    x: '200', y: '60', 'text-anchor': 'middle',
                    fill: '#8b949e', 'font-family': 'JetBrains Mono, monospace', 'font-size': '13',
                });
                txt.textContent = 'No containers configured';
                svg.appendChild(txt);
                return;
            }

            var layout = computeLayout(containers);
            var pos    = layout.pos;
            var W      = layout.totalW;
            var H      = layout.totalH;

            // Container name → data lookup
            var byName = {};
            containers.forEach(function (c) { byName[c.name] = c; });

            // ── Defs: arrow marker ────────────────────────────────────────
            var defs   = svgEl('defs');
            var marker = svgEl('marker', {
                id: 'sv-arrow', markerWidth: '10', markerHeight: '7',
                refX: '9', refY: '3.5', orient: 'auto',
            });
            marker.appendChild(svgEl('path', { d: 'M0,0 L0,7 L10,3.5 z', fill: '#4d5562' }));
            defs.appendChild(marker);
            svg.appendChild(defs);

            // ── Group backgrounds (drawn behind edges and nodes) ──────────
            var GPAD = 16;
            groups.forEach(function (g) {
                var members = (g.containers || []).filter(function (n) { return pos[n]; });
                if (!members.length) return;

                var xs = members.map(function (n) { return pos[n].x; });
                var ys = members.map(function (n) { return pos[n].y; });
                var gx = Math.min.apply(null, xs) - GPAD;
                var gy = Math.min.apply(null, ys) - GPAD;
                var gw = Math.max.apply(null, xs) + NODE_W + GPAD - gx;
                var gh = Math.max.apply(null, ys) + NODE_H + GPAD - gy;

                svg.appendChild(svgEl('rect', {
                    x: gx, y: gy, width: gw, height: gh, rx: '12',
                    fill: 'rgba(43,117,238,0.05)',
                    stroke: 'rgba(43,117,238,0.25)', 'stroke-width': '1',
                    'stroke-dasharray': '5 3',
                }));

                var lbl = svgEl('text', {
                    x: gx + 10, y: gy + 14,
                    'font-family': 'JetBrains Mono, monospace', 'font-size': '10', 'font-weight': '600',
                    fill: 'rgba(43,117,238,0.7)', 'letter-spacing': '0.08em',
                });
                lbl.textContent = g.name.toUpperCase();
                svg.appendChild(lbl);
            });

            // ── Edges (drawn before nodes so nodes appear on top) ─────────
            containers.forEach(function (c) {
                if (!pos[c.name]) return;
                var src = pos[c.name];
                (c.depends_on || []).forEach(function (dep) {
                    if (!pos[dep]) return;
                    var tgt = pos[dep];
                    var sx  = src.x + NODE_W,  sy = src.y + NODE_H / 2;
                    var tx  = tgt.x,           ty = tgt.y + NODE_H / 2;
                    var cp  = Math.max(H_GAP * 0.45, 36);

                    svg.appendChild(svgEl('path', {
                        d: 'M ' + sx + ' ' + sy +
                           ' C ' + (sx + cp) + ' ' + sy +
                           ' ' + (tx - cp) + ' ' + ty +
                           ' ' + tx + ' ' + ty,
                        fill: 'none', stroke: '#4d5562', 'stroke-width': '1.5',
                        'marker-end': 'url(#sv-arrow)',
                    }));
                });
            });

            // ── Nodes ─────────────────────────────────────────────────────
            containers.forEach(function (c) {
                if (!pos[c.name]) return;
                var x  = pos[c.name].x;
                var y  = pos[c.name].y;
                var st = getStyle(c.status);

                var g = svgEl('g', { class: 'sv-node', 'data-name': c.name });

                // Background rect
                g.appendChild(svgEl('rect', {
                    class: 'node-bg',
                    x: x, y: y, width: NODE_W, height: NODE_H, rx: '8',
                    fill: st.fill, stroke: st.stroke, 'stroke-width': '1.5',
                }));

                // Left accent bar (status colour strip)
                g.appendChild(svgEl('rect', {
                    x: x + 1.5, y: y + 6, width: '3', height: NODE_H - 12, rx: '1.5',
                    fill: st.bar,
                }));

                // Simple Icon — always rendered (fallback: hidden on error)
                var slug = (c.icon && c.icon.trim()) ? c.icon.trim() : 'docker';
                var iconSize = 18, iconX = x + 12, iconY = y + (NODE_H - iconSize) / 2;
                var img = svgEl('image', {
                    href:   SI_CDN + encodeURIComponent(slug) + '.svg',
                    x:      iconX, y: iconY,
                    width:  iconSize, height: iconSize,
                    style:  'filter: brightness(0) invert(1); opacity: 0.8;',
                });
                img.addEventListener('error', function () { this.style.display = 'none'; });
                g.appendChild(img);

                // Name text — truncated if needed
                var textX   = x + 12 + iconSize + 8; // left pad + icon + gap
                var maxW    = NODE_W - (12 + iconSize + 8) - 10; // available px
                var maxChar = Math.floor(maxW / 7.3);             // ~7.3px per char at 12px mono
                var label   = c.name.length > maxChar ? c.name.slice(0, maxChar - 1) + '\u2026' : c.name;
                var txt = svgEl('text', {
                    x:                  textX,
                    y:                  y + NODE_H / 2,
                    'font-family':      'JetBrains Mono, monospace',
                    'font-size':        '12',
                    'font-weight':      '500',
                    fill:               '#e6edf3',
                    'dominant-baseline': 'central',
                });
                txt.textContent = label;
                g.appendChild(txt);

                svg.appendChild(g);
            });

            // ── Set final SVG dimensions ──────────────────────────────────
            svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
            svg.setAttribute('width',   W);
            svg.setAttribute('height',  H);
            svg.style.minHeight = '';

            // ── Click: open detail panel ──────────────────────────────────
            svg.addEventListener('click', function (e) {
                var node = e.target.closest('.sv-node');
                if (!node) return;
                openPanel(node.dataset.name);
            });
        }

        // ─── Theme toggle ─────────────────────────────────────────────────
        function toggleTheme() {
            var dark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dag-theme', dark ? 'dark' : 'light');
            document.getElementById('theme-icon-dark').classList.toggle('hidden', !dark);
            document.getElementById('theme-icon-light').classList.toggle('hidden', dark);
        }
        (function () {
            var saved = localStorage.getItem('dag-theme');
            if (saved === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon-dark').classList.add('hidden');
                document.getElementById('theme-icon-light').classList.remove('hidden');
            }
        })();

        // ─── Detail panel ─────────────────────────────────────────────────
        var STATUS_DOT = { running: '#238636', stopped: '#8b949e', starting: '#d29922', failed: '#da3633' };

        function formatUptime(iso) {
            if (!iso) return '\u2014';
            var s = Math.floor((Date.now() - new Date(iso)) / 1000);
            if (s < 0)     return '\u2014';
            if (s < 60)    return s + 's';
            if (s < 3600)  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
            if (s < 86400) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
            return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h';
        }

        function formatTs(iso) { return iso ? new Date(iso).toLocaleTimeString() : '\u2014'; }

        function openPanel(name) {
            var c = (DATA.containers || []).find(function (x) { return x.name === name; });
            if (!c) return;

            var cls = toDisplayClass(c.status);
            document.getElementById('panel-name').textContent               = c.name;
            document.getElementById('panel-status-dot').style.background    = STATUS_DOT[cls] || STATUS_DOT.stopped;
            document.getElementById('panel-status').textContent             = c.status || 'unknown';
            document.getElementById('panel-image').textContent              = c.image  || '\u2014';
            document.getElementById('panel-host').textContent               = c.host   || '\u2014';
            document.getElementById('panel-port').textContent               = c.target_port  || '\u2014';
            document.getElementById('panel-health').textContent             = c.health_path  || '\u2014';
            document.getElementById('panel-uptime').textContent             = formatUptime(c.started_at);
            document.getElementById('panel-last-req').textContent           = formatTs(c.last_request);
            document.getElementById('panel-idle').textContent               = c.idle_timeout || '\u2014';

            // Icon in panel header
            var slug        = (c.icon && c.icon.trim()) ? c.icon.trim() : 'docker';
            var iconEl      = document.getElementById('panel-icon');
            var iconFallback = document.getElementById('panel-icon-fallback');
            iconEl.style.display      = '';
            iconFallback.style.display = 'none';
            iconEl.onerror = function () {
                iconEl.style.display      = 'none';
                iconFallback.style.display = '';
            };
            iconEl.onload = function () {
                iconEl.style.display      = '';
                iconFallback.style.display = 'none';
            };
            iconEl.alt = c.name;
            iconEl.src = SI_CDN + encodeURIComponent(slug) + '.svg';

            // Depends on
            var deps    = c.depends_on || [];
            var depsRow = document.getElementById('panel-deps-row');
            document.getElementById('panel-deps').textContent = deps.join(', ');
            depsRow.classList.toggle('hidden', deps.length === 0);

            // Schedule
            var schedRow = document.getElementById('panel-schedule-row');
            if (c.schedule_start && c.schedule_stop) {
                document.getElementById('panel-schedule').textContent =
                    'Start: ' + c.schedule_start + ' / Stop: ' + c.schedule_stop;
                schedRow.classList.remove('hidden');
            } else {
                schedRow.classList.add('hidden');
            }

            document.getElementById('panel').classList.remove('hidden');
        }

        function closePanel() { document.getElementById('panel').classList.add('hidden'); }
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePanel(); });

        // ─── Init ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', renderGraph);
    </script>

</body>
