# Docker Awakening Gateway — Test Configuration
#
# This config is used by docker-compose.yml for local testing.
# Mount path: /etc/gateway/config.yaml (set via CONFIG_PATH env var)

gateway:
  port: "8080"
  schedule_timezone: "Europe/Rome"
  log_lines: 30
  # discovery_interval: "15s"  # label polling frequency (default: 15s, or DISCOVERY_INTERVAL env var)

containers:

# Example with dependency (uncomment to use):
#  - name: "web-app"
#    host: "app.localhost"
#    target_port: "3000"
#    depends_on: ["postgres"]   # postgres will be started first
#
#  - name: "postgres"
#    target_port: "5432"        # no host needed — dependency-only

# Example group with load balancing (uncomment to use):
# groups:
#   - name: "api-cluster"
#     host: "api.localhost"
#     strategy: "round-robin"   # default: round-robin
#     containers: ["api-1", "api-2"]



  # ------------------------------------------------------------------
  # TOPOLOGY DEMO — frontend → backend → db
  # Remove once the topology view demo is no longer needed.
  # ------------------------------------------------------------------
  - name: "demo-frontend"
    host: "demo-frontend.localhost:8080"
    icon: "react"
    target_port: "80"
    idle_timeout: "10m"
    depends_on: ["demo-backend"]

  - name: "demo-backend"
    host: "demo-backend.localhost:8080"
    icon: "go"
    target_port: "80"
    idle_timeout: "10m"
    depends_on: ["demo-db"]

  - name: "demo-db"
    host: "demo-db.localhost:8080"
    icon: "postgresql"
    target_port: "80"
    idle_timeout: "10m"

  # ------------------------------------------------------------------
  # fail-app: always exits immediately with code 1.
  # Tests: start_timeout expiry → error page.
  # Use a short start_timeout so the error page shows quickly.
  # ------------------------------------------------------------------
  - name: "fail-app"
    host: "fail-app.localhost:8080"
    icon: "docker"
    target_port: "80"
    network: ""         # leave empty to use first available network
    start_timeout: "8s"
    idle_timeout: "0"
    redirect_path: "/"

  # ------------------------------------------------------------------
  # sched-offline: mostra la pagina "Scheduled Downtime" subito.
  # schedule_stop sparato alle 10:00, schedule_start alle 11:00.
  # Visita http://sched-offline.localhost:8080 → pagina offline.
  # ------------------------------------------------------------------
  - name: "sched-offline"
    host: "sched-offline.localhost:8080"
    target_port: "80"
    idle_timeout: "0"
    schedule_stop: "0 8 * * *"     # 08:00 UTC = 10:00 IT — sparato 10 min fa
    schedule_start: "35 8 * * *"    # 09:00 UTC = 10:35 IT — prossimo start

  # ------------------------------------------------------------------
  # sched-live: testa il cron reale.
  # schedule_start alle 10:16, schedule_stop alle 10:17.
  # Avvia docker-compose entro le 10:15 e guarda i log.
  # ------------------------------------------------------------------
  - name: "sched-live"
    host: "sched-live.localhost:8080"
    target_port: "80"
    idle_timeout: "0"
    schedule_start: "16 8 * * *"   # 08:16 UTC = 10:16 IT
    schedule_stop:  "40 8 * * *"   # 08:17 UTC = 10:40 IT
